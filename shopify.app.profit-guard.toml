# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a13cf877db2a9dbc1119b90eb287a7cf"
name = "Margin Sentinel"
application_url = "https://profit-guard-xzku.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "/webhooks/compliance"

[[webhooks.subscriptions]]
topics = ["app_subscriptions/update"]
uri = "/webhooks/app_subscriptions/update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_inventory,read_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://profit-guard-xzku.onrender.com/auth/callback",
  "https://profit-guard-xzku.onrender.com/auth/shopify/callback",
  "https://profit-guard-xzku.onrender.com/api/auth/callback"
]
