<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Margin Sentinel Reviewer Demo</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #5b6472;
      --line: #d9dde3;
      --wash: #f4f6f8;
      --paper: #ffffff;
      --green: #146b4b;
      --amber: #8a5a00;
      --red: #9f2414;
      --blue: #2454a6;
    }
    * { box-sizing: border-box; }
    html, body { width: 1600px; height: 900px; margin: 0; overflow: hidden; }
    body {
      background: var(--wash);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: none;
      letter-spacing: 0;
    }
    button, input { font: inherit; }
    .topbar {
      height: 72px;
      padding: 0 38px 0 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 850; font-size: 24px; }
    .mark { width: 38px; height: 38px; border-radius: 9px; background: var(--green); color: #fff; display: grid; place-items: center; font-weight: 900; }
    .nav { display: flex; align-items: center; gap: 10px; }
    .nav button {
      border: 0;
      background: transparent;
      color: #475467;
      padding: 10px 12px;
      border-radius: 7px;
      font-weight: 650;
      cursor: none;
    }
    .nav button.active { background: #e9f7ef; color: var(--green); }
    .page { height: 828px; padding: 30px 38px 32px; display: grid; gap: 18px; align-content: start; }
    .page-title { display: flex; align-items: end; justify-content: space-between; gap: 24px; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 42px; line-height: 1.08; }
    h2 { font-size: 27px; line-height: 1.16; }
    h3 { font-size: 19px; line-height: 1.2; }
    p { color: var(--muted); font-size: 16px; line-height: 1.45; }
    .button {
      min-width: 142px;
      height: 42px;
      padding: 0 16px;
      border: 0;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      font-weight: 780;
      cursor: none;
    }
    .button.secondary { background: #eef2f7; color: var(--ink); }
    .button[disabled] { opacity: .65; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .section, .card, .modal {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .section { padding: 20px; display: grid; gap: 14px; }
    .stat { padding: 15px 16px; border: 1px solid var(--line); border-radius: 8px; background: #fff; min-height: 92px; }
    .stat span { display: block; color: #627083; font-size: 13px; font-weight: 720; }
    .stat strong { display: block; font-size: 30px; line-height: 1.1; margin-top: 6px; }
    .tone-success strong { color: var(--green); }
    .tone-warning strong { color: var(--amber); }
    .tone-critical strong { color: var(--red); }
    .action { border: 1px solid #efd390; background: #fff8df; border-radius: 8px; padding: 18px; display: grid; gap: 7px; }
    .action .label { color: var(--amber); font-size: 13px; font-weight: 850; text-transform: uppercase; }
    .action strong { font-size: 25px; }
    .links { display: flex; gap: 14px; flex-wrap: wrap; }
    .link-button {
      border: 0;
      background: transparent;
      color: #1453a6;
      font-weight: 750;
      padding: 0;
      cursor: none;
    }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; font-size: 14px; }
    th, td { padding: 11px 10px; border-bottom: 1px solid #eceff2; text-align: left; vertical-align: middle; }
    th { color: #697383; font-size: 11px; font-weight: 850; text-transform: uppercase; }
    tr:last-child td { border-bottom: 0; }
    tr.clickable { cursor: none; }
    tr.selected { background: #f0f8f4; outline: 2px solid #9ac7b0; outline-offset: -2px; }
    .num { text-align: right; }
    .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 96px; padding: 5px 8px; border: 1px solid; border-radius: 7px; font-size: 12px; font-weight: 830; white-space: nowrap; }
    .loss { color: var(--red); background: #fff1ed; border-color: #ffd0c2; }
    .low { color: var(--amber); background: #fff8db; border-color: #eed283; }
    .ok { color: var(--green); background: #e9f7ef; border-color: #bfe1cc; }
    .blue { color: var(--blue); background: #edf5ff; border-color: #c9dcff; }
    .detail {
      border: 1px solid #bfe1cc;
      background: #f4fbf7;
      border-radius: 8px;
      padding: 16px;
      display: grid;
      gap: 7px;
    }
    .empty {
      min-height: 298px;
      display: grid;
      place-items: center;
      text-align: center;
      background: #fff;
      border: 1px dashed #c8ced6;
      border-radius: 8px;
    }
    .plans { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .plan { min-height: 430px; padding: 24px; display: grid; grid-template-rows: auto auto 1fr auto; gap: 16px; background: #fff; border: 1px solid var(--line); border-radius: 8px; }
    .plan.featured { border-color: #9ac7b0; box-shadow: 0 20px 50px rgba(20, 30, 40, .08); }
    .price { font-size: 42px; font-weight: 900; }
    ul { margin: 0; padding-left: 21px; color: var(--muted); line-height: 1.62; font-size: 16px; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background: #101827; color: #eaf0f7; border-radius: 8px; padding: 17px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
    .toast {
      position: fixed;
      right: 34px;
      bottom: 96px;
      background: #111827;
      color: #fff;
      border-radius: 8px;
      padding: 13px 16px;
      font-weight: 730;
      box-shadow: 0 14px 40px rgba(17, 24, 39, .18);
      opacity: 0;
      transform: translateY(12px);
      transition: .2s ease;
      z-index: 40;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .caption {
      position: fixed;
      left: 32px;
      right: 32px;
      bottom: 22px;
      min-height: 52px;
      background: rgba(17, 24, 39, .92);
      color: #fff;
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 19px;
      font-weight: 760;
      z-index: 35;
    }
    .cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 34px;
      height: 34px;
      pointer-events: none;
      z-index: 80;
      transform: translate(-100px, -100px);
      transition: transform .055s linear;
      filter: drop-shadow(0 3px 3px rgba(17, 24, 39, .28));
    }
    .cursor svg { display: block; }
    .ripple {
      position: fixed;
      width: 20px;
      height: 20px;
      margin-left: -10px;
      margin-top: -10px;
      border-radius: 50%;
      border: 4px solid rgba(15, 118, 110, .72);
      background: rgba(15, 118, 110, .18);
      pointer-events: none;
      z-index: 75;
      animation: ripple .75s ease-out forwards;
    }
    @keyframes ripple {
      to { transform: scale(6.5); opacity: 0; }
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, .34);
      display: grid;
      place-items: center;
      z-index: 45;
    }
    .modal { width: 560px; padding: 24px; display: grid; gap: 16px; box-shadow: 0 24px 80px rgba(17,24,39,.2); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast"></div>
  <div id="caption" class="caption">Margin Sentinel reviewer demo</div>
  <div id="cursor" class="cursor" aria-hidden="true">
    <svg width="34" height="34" viewBox="0 0 80 80">
      <path d="M12 8 L12 62 L27 48 L36 70 L49 65 L39 44 L59 44 Z" fill="#ffffff" stroke="#111827" stroke-width="5" stroke-linejoin="round"/>
    </svg>
  </div>

  <script>
    const findings = [
      { issue: "Losing money", type: "loss", product: "Red Snowboard", sku: "-", price: "$100.00", cost: "$120.00", source: "Shopify unit cost", margin: "-20.0%", risk: "$0.00", min: "$171.43", action: "Raise price or reduce cost before selling more." },
      { issue: "Low margin", type: "low", product: "The Multi-managed Snowboard", sku: "sku-managed-1", price: "$629.95", cost: "$500.00", source: "Supplier import", margin: "20.6%", risk: "$5,904", min: "$714.29", action: "Review price, supplier cost, or discount rules." },
      { issue: "Low margin", type: "low", product: "The Inventory Not Tracked Snowboard", sku: "sku-untracked-1", price: "$949.95", cost: "$700.00", source: "Supplier import", margin: "26.3%", risk: "$0.00", min: "$1,000", action: "Review supplier cost or target margin." },
      { issue: "Low margin", type: "low", product: "Green Snowboard", sku: "GREEN-SNOWBOARD", price: "$100.00", cost: "$85.00", source: "Supplier import", margin: "15.0%", risk: "$0.00", min: "$121.43", action: "Use suggested minimum price." },
    ];

    const state = {
      page: "dashboard",
      scanned: false,
      scanning: false,
      selectedFinding: null,
      templateDownloaded: false,
      importing: false,
      importDone: false,
      whatIfRunning: false,
      whatIfDone: false,
      billingModal: false,
      exported: false,
    };

    const app = document.getElementById("app");
    const toast = document.getElementById("toast");
    const caption = document.getElementById("caption");
    const cursor = document.getElementById("cursor");

    function demoSetCaption(text) { caption.textContent = text; }
    window.demoSetCaption = demoSetCaption;

    document.addEventListener("mousemove", (event) => {
      cursor.style.transform = `translate(${event.clientX - 5}px, ${event.clientY - 3}px)`;
    });
    document.addEventListener("mousedown", (event) => {
      const ripple = document.createElement("div");
      ripple.className = "ripple";
      ripple.style.left = `${event.clientX}px`;
      ripple.style.top = `${event.clientY}px`;
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 850);
    });

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function setPage(page) {
      state.page = page;
      state.billingModal = false;
      render();
    }

    function runScan() {
      state.scanning = true;
      state.scanned = false;
      state.selectedFinding = null;
      render();
      setTimeout(() => {
        state.scanning = false;
        state.scanned = true;
        render();
        showToast("Profit scan completed");
      }, 1400);
    }

    function previewImport() {
      state.importing = true;
      state.importDone = false;
      render();
      setTimeout(() => {
        state.importing = false;
        state.importDone = true;
        render();
        showToast("4 supplier costs matched");
      }, 1200);
    }

    function runWhatIf() {
      state.whatIfRunning = true;
      state.whatIfDone = false;
      render();
      setTimeout(() => {
        state.whatIfRunning = false;
        state.whatIfDone = true;
        render();
        showToast("What-if scenario completed");
      }, 1100);
    }

    function exportCsv() {
      state.exported = true;
      render();
      showToast("CSV export generated");
    }

    function downloadTemplate() {
      state.templateDownloaded = true;
      render();
      showToast("Variant cost template ready");
    }

    function navButton(page, label) {
      return `<button data-demo="nav-${page}" class="${state.page === page ? "active" : ""}" onclick="setPage('${page}')">${label}</button>`;
    }

    function shell(content) {
      app.innerHTML = `
        <div class="topbar">
          <div class="brand"><span class="mark">M</span>Margin Sentinel</div>
          <div class="nav">
            ${navButton("dashboard", "Dashboard")}
            ${navButton("import", "Import costs")}
            ${navButton("whatif", "What-if")}
            ${navButton("export", "Export")}
            ${navButton("pricing", "Pricing")}
          </div>
        </div>
        <main class="page">${content}</main>
        ${state.billingModal ? billingModal() : ""}
      `;
    }

    function stat(label, value, tone = "") {
      return `<div class="stat ${tone}"><span>${label}</span><strong>${value}</strong></div>`;
    }

    function findingRows(selectable = true) {
      return findings.map((finding, index) => `
        <tr data-demo="finding-row-${index}" class="${selectable ? "clickable" : ""} ${state.selectedFinding === index ? "selected" : ""}" ${selectable ? `onclick="state.selectedFinding=${index}; render(); showToast('Finding selected')"` : ""}>
          <td><span class="badge ${finding.type}">${finding.issue}</span></td>
          <td>${finding.product}</td>
          <td>${finding.sku}</td>
          <td class="num">${finding.price}</td>
          <td class="num">${finding.cost}</td>
          <td>${finding.source}</td>
          <td class="num">${finding.margin}</td>
          <td class="num">${finding.risk}</td>
          <td class="num">${finding.min}</td>
        </tr>
      `).join("");
    }

    function findingsTable(selectable = true) {
      return `
        <table>
          <thead>
            <tr><th>Issue</th><th>Product</th><th>SKU</th><th class="num">Price</th><th class="num">Cost</th><th>Cost source</th><th class="num">Margin</th><th class="num">Risk</th><th class="num">Min price</th></tr>
          </thead>
          <tbody>${findingRows(selectable)}</tbody>
        </table>
      `;
    }

    function renderDashboard() {
      if (!state.scanned && !state.scanning) {
        shell(`
          <div class="page-title">
            <div><h1>Automatic profit scan</h1><p>Reads Shopify prices, Shopify unit costs, and imported supplier costs. It never changes prices automatically.</p></div>
            <button class="button" data-demo="run-scan" onclick="runScan()">Run profit scan</button>
          </div>
          <div class="empty">
            <div>
              <h2>Start with one scan</h2>
              <p>Margin Sentinel will find loss, low margin, missing costs, inventory risk, and suggested minimum prices.</p>
            </div>
          </div>
        `);
        return;
      }

      shell(`
        <div class="page-title">
          <div><h1>Automatic profit scan</h1><p>Reads Shopify prices, Shopify unit costs, and imported supplier costs. It never changes prices automatically.</p></div>
          <button class="button" data-demo="run-scan" onclick="runScan()" ${state.scanning ? "disabled" : ""}>${state.scanning ? "Scanning..." : "Run profit scan"}</button>
        </div>
        ${state.scanning ? `
          <div class="empty"><div><h2>Scanning Shopify variants...</h2><p>Checking prices, costs, inventory, and margin targets.</p></div></div>
        ` : `
          <div class="grid-2">
            <section class="section">
              <h2>Action center</h2>
              <div class="grid-3">
                ${stat("Catalog healthy", "86%", "tone-success")}
                ${stat("Issues to review", "4", "tone-warning")}
                ${stat("Inventory risk", "$5,904", "tone-warning")}
              </div>
              <div class="action" data-demo="fix-first" onclick="state.selectedFinding=0; render(); showToast('Fix first opened')">
                <span class="label">Fix first</span>
                <strong>Red Snowboard</strong>
                <p>Raise price or reduce cost before selling more. Suggested minimum price for 30.0% margin: $171.43.</p>
                <p>Cost source: Shopify unit cost.</p>
                <div class="links">
                  <button class="link-button" data-demo="export-full-list" onclick="event.stopPropagation(); setPage('export')">Export full fix list</button>
                  <button class="link-button" onclick="event.stopPropagation(); setPage('import')">Import supplier costs</button>
                  <button class="link-button" onclick="event.stopPropagation(); showToast('Weekly alerts are a paid setting')">Enable weekly alerts</button>
                </div>
              </div>
            </section>
            <section class="section">
              <h2>Latest scan</h2>
              <div class="grid-4">
                ${stat("Variants checked", "29")}
                ${stat("Losing money", "1", "tone-critical")}
                ${stat("Low margin", "3", "tone-warning")}
                ${stat("Missing cost", "0", "tone-success")}
              </div>
              <div class="grid-4">
                ${stat("Direct loss", "$20", "tone-critical")}
                ${stat("Margin gap", "$159", "tone-warning")}
                ${stat("Inventory risk", "$5,904", "tone-warning")}
                ${stat("OK variants", "25", "tone-success")}
              </div>
              ${state.selectedFinding !== null ? `<div class="detail"><h3>${findings[state.selectedFinding].product}</h3><p>${findings[state.selectedFinding].action}</p><p>Suggested minimum price: ${findings[state.selectedFinding].min}</p></div>` : ""}
            </section>
          </div>
          <section class="section">
            <div class="page-title"><h2>Review findings</h2><p>Showing 4 saved findings, sorted by highest priority.</p></div>
            ${findingsTable(true)}
          </section>
        `}
      `);
    }

    function renderPricing() {
      shell(`
        <div class="page-title"><div><h1>Simple catalog-based pricing</h1><p>Built for catalog margin protection, with Shopify-managed billing and a free plan for small stores.</p></div></div>
        <div class="plans">
          <div class="plan">
            <div><span class="badge blue">Free</span><h2 style="margin-top:12px;">Free</h2></div>
            <div class="price">$0</div>
            <ul><li>Scan up to 100 variants</li><li>Margin leak dashboard</li><li>CSV findings export</li></ul>
            <button class="button secondary" data-demo="plan-free" onclick="showToast('Free plan selected')">Current plan</button>
          </div>
          <div class="plan featured">
            <div><span class="badge ok">Starter</span><h2 style="margin-top:12px;">Starter</h2></div>
            <div class="price">$15/month</div>
            <ul><li>Scan up to 5,000 variants</li><li>Variant cost template and supplier import</li><li>Suggested minimum prices</li><li>Cost-change what-if</li><li>Weekly alerts</li></ul>
            <button class="button" data-demo="plan-starter" onclick="state.billingModal=true; render()">Start 14-day trial</button>
          </div>
          <div class="plan">
            <div><span class="badge blue">Growth</span><h2 style="margin-top:12px;">Growth</h2></div>
            <div class="price">$39/month</div>
            <ul><li>Scan up to 25,000 variants</li><li>Supplier CSV cost import</li><li>Suggested minimum prices</li><li>Weekly alerts</li><li>Priority support</li></ul>
            <button class="button" data-demo="plan-growth" onclick="state.billingModal=true; render()">Start 14-day trial</button>
          </div>
        </div>
        <section class="section"><h2>Upgrade and downgrade inside the app</h2><p>Paid charges go through Shopify billing. Merchants can return to Free from the Pricing page.</p></section>
      `);
    }

    function billingModal() {
      return `
        <div class="modal-backdrop">
          <div class="modal">
            <h2>Shopify billing confirmation</h2>
            <p>In production, Shopify opens the managed billing approval screen for the selected plan.</p>
            <div class="grid-3">
              ${stat("Trial", "14 days")}
              ${stat("Plan", "Starter")}
              ${stat("Price", "$15/mo")}
            </div>
            <button class="button" data-demo="billing-close" onclick="state.billingModal=false; render(); showToast('Billing screen preview closed')">Back to app</button>
          </div>
        </div>
      `;
    }

    function renderImport() {
      shell(`
        <div class="page-title"><div><h1>Import supplier costs</h1><p>Upload variant ID, inventory item ID, or SKU plus cost. Preview first, save only when ready.</p></div></div>
        <div class="grid-2">
          <section class="section">
            <h2>Bulk cost import</h2>
            <p>Use the generated template when SKUs are missing or inconsistent.</p>
            <div class="code">variant_id,inventory_item_id,sku,cost
gid://shopify/ProductVariant/123,,GREEN-SNOWBOARD,85.00
,gid://shopify/InventoryItem/456,sku-managed-1,500.00</div>
            <div class="links">
              <button class="button secondary" data-demo="download-template" onclick="downloadTemplate()">Download variant cost template</button>
              <button class="button" data-demo="preview-import" onclick="previewImport()" ${state.importing ? "disabled" : ""}>${state.importing ? "Previewing..." : "Preview / import costs"}</button>
            </div>
            ${state.templateDownloaded ? `<div class="detail"><h3>Template ready</h3><p>The template includes Shopify variant IDs, inventory item IDs, SKUs, and blank cost cells.</p></div>` : ""}
          </section>
          <section class="section">
            <h2>Import result</h2>
            ${state.importing ? `<div class="empty"><div><h2>Matching CSV rows...</h2><p>Checking identifiers against Shopify variants.</p></div></div>` : state.importDone ? `
              <div class="grid-4">
                ${stat("CSV rows", "4")}
                ${stat("Matched", "4", "tone-success")}
                ${stat("Saved", "4")}
                ${stat("Warnings", "0", "tone-warning")}
              </div>
              <div class="action"><span class="label">Costs matched</span><p>4 rows matched Shopify variants. Review the margin preview before saving supplier costs.</p></div>
              <div class="grid-3">
                ${stat("Losing money", "1", "tone-critical")}
                ${stat("Low margin", "3", "tone-warning")}
                ${stat("Inventory risk", "$5,904", "tone-warning")}
              </div>
            ` : `<div class="empty"><div><h2>No import preview yet</h2><p>Click Preview / import costs to see matched rows and margin impact.</p></div></div>`}
          </section>
        </div>
      `);
    }

    function renderWhatIf() {
      shell(`
        <div class="page-title"><div><h1>Cost-change what-if</h1><p>Model supplier cost changes before low-margin products keep selling.</p></div><button class="button" data-demo="run-whatif" onclick="runWhatIf()" ${state.whatIfRunning ? "disabled" : ""}>${state.whatIfRunning ? "Running..." : "Run what-if"}</button></div>
        <div class="grid-2">
          <section class="section">
            <h2>Scenario input</h2>
            <p>Supplier cost increase</p>
            <div class="stat"><span>Cost increase</span><strong>8%</strong></div>
            <p>Current target margin: 30.0%. Current plan: Starter.</p>
          </section>
          <section class="section">
            <h2>If costs rise 8%</h2>
            ${state.whatIfRunning ? `<div class="empty"><div><h2>Running scenario...</h2><p>Recalculating margins with higher supplier costs.</p></div></div>` : state.whatIfDone ? `
              <div class="grid-4">
                ${stat("Variants with cost", "29")}
                ${stat("New at-risk SKUs", "2", "tone-warning")}
                ${stat("Added risk", "$742", "tone-warning")}
                ${stat("Total risk", "$6,646", "tone-warning")}
              </div>
              <table>
                <thead><tr><th>Product</th><th>Issue</th><th class="num">Scenario cost</th><th class="num">Margin</th><th>Next action</th></tr></thead>
                <tbody>
                  <tr><td>The Multi-managed Snowboard</td><td><span class="badge low">Low margin</span></td><td class="num">$540.00</td><td class="num">14.3%</td><td>Review price or supplier cost</td></tr>
                  <tr><td>Green Snowboard</td><td><span class="badge low">Low margin</span></td><td class="num">$91.80</td><td class="num">8.2%</td><td>Suggested minimum: $131.14</td></tr>
                  <tr><td>Red Snowboard</td><td><span class="badge loss">Loss</span></td><td class="num">$129.60</td><td class="num">-29.6%</td><td>Raise price before selling more</td></tr>
                </tbody>
              </table>
            ` : `<div class="empty"><div><h2>No scenario yet</h2><p>Click Run what-if to model supplier cost changes.</p></div></div>`}
          </section>
        </div>
      `);
    }

    function renderExport() {
      shell(`
        <div class="page-title"><div><h1>Export findings CSV</h1><p>Download a clean fix list for pricing review, supplier follow-up, or team action.</p></div><button class="button" data-demo="download-csv" onclick="exportCsv()">${state.exported ? "Download again" : "Download CSV"}</button></div>
        <section class="section">
          <h2>Complete fix list</h2>
          <p>CSV includes issue type, product, SKU, price, cost, cost source, margin, inventory risk, suggested minimum price, and next action.</p>
          <div class="links"><span class="badge ok">Read-only export</span><span class="badge low">Suggested prices included</span><span class="badge blue">Team-ready CSV</span></div>
        </section>
        <section class="section">
          <div class="page-title"><h2>Actionable next steps</h2><p>4 findings ready for review</p></div>
          <table>
            <thead><tr><th>Issue</th><th>Product</th><th>Cost source</th><th class="num">Margin</th><th class="num">Risk</th><th>Next action</th></tr></thead>
            <tbody>
              ${findings.map((finding) => `<tr><td><span class="badge ${finding.type}">${finding.issue}</span></td><td>${finding.product}</td><td>${finding.source}</td><td class="num">${finding.margin}</td><td class="num">${finding.risk}</td><td>${finding.action}</td></tr>`).join("")}
            </tbody>
          </table>
        </section>
        ${state.exported ? `<section class="section"><h2>CSV ready</h2><p>File name: margin-sentinel-findings-2026-06-14.csv. The app generated a download; no prices were changed.</p></section>` : `<section class="section"><h2>Reviewer note</h2><p>Export is a download-only action. Margin Sentinel never changes Shopify prices automatically.</p></section>`}
      `);
    }

    function render() {
      if (state.page === "dashboard") renderDashboard();
      if (state.page === "pricing") renderPricing();
      if (state.page === "import") renderImport();
      if (state.page === "whatif") renderWhatIf();
      if (state.page === "export") renderExport();
    }

    render();
  </script>
</body>
</html>
